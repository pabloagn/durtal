# =============================================================================
# Durtal — Local Development Compose
# =============================================================================
# This is for local development only. Production runs as a single container
# on osmium.rh with Neon (remote) and S3 (remote).
# =============================================================================

services:
  durtal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: durtal-dev
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - NODE_ENV=production
    restart: unless-stopped
